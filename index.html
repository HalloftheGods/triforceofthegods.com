<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>The Codex | Triforce of the Gods</title>
  <style>
    :root {
      --gold: #d4af37;
      --bg: #030305;
      --text-main: rgba(255, 255, 255, 0.85);
      --text-muted: rgba(255, 255, 255, 0.5);
      --cyan: #00f3ff;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      user-select: none;
    }

    /* 3D Canvas Background */
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    /* UI Layer */
    .top-header {
      position: absolute;
      top: 4rem;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
      font-size: 2.05rem;
      letter-spacing: 1em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.6;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    #app {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 2rem;
      pointer-events: none;
      /* Let drag events pass through to 3D canvas */
    }

    .main-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .pagination {
      margin-top: 1rem;
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }

    .page-number {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 1.1rem;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      padding: 5px;
    }

    .page-number:hover {
      color: var(--gold);
      text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
    }

    .page-number.active {
      color: var(--gold);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
      transform: scale(1.2);
    }

    .debug-controls {
      position: absolute;
      right: 3rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: auto;
    }

    .debug-btn {
      background: rgba(3, 3, 5, 0.6);
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      font-size: 1rem;
      font-weight: bold;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .debug-btn.active {
      color: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    .codex-container {
      flex: 1;
      max-width: 1100px;
      text-align: center;
      padding: 2rem 3rem;
      background: linear-gradient(0deg, rgba(3, 3, 5, 0.95) 0%, rgba(3, 3, 5, 0) 100%);
      border: none;
      backdrop-filter: blur(4px);
      margin: 0 20px;
    }

    .chapter {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }

    .title {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      margin-top: 0;
      margin-bottom: 1rem;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .body-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--text-main);
      margin-bottom: 0;
    }

    .controls {
      pointer-events: auto;
      /* Re-enable clicks for buttons */
    }

    button {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1.5rem;
      padding: 15px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Vue Transitions */
    .fade-enter-active,
    .fade-leave-active {
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .fade-enter-from {
      opacity: 0;
      transform: translateY(15px);
    }

    .fade-leave-to {
      opacity: 0;
      transform: translateY(-15px);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

  <div class="top-header">TRIFORCE OF THE GODS</div>

  <div id="canvas-container"></div>

  <div id="app">
    <div class="main-row">
      <div class="controls">
        <button
          @click="prev"
          :disabled="activeAxiom === 0"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <polygon
              points="16,6 16,18 8,12"
              fill="var(--gold)"
            />
          </svg>
        </button>
      </div>

      <transition
        name="fade"
        mode="out-in"
      >
        <div
          :key="activeAxiom"
          class="codex-container"
        >
          <div class="chapter">{{ currentContent.chapter }}</div>
          <h1 class="title">{{ currentContent.title }}</h1>
          <p class="body-text">{{ currentContent.body }}</p>
        </div>
      </transition>

      <div class="controls">
        <button
          @click="next"
          :disabled="activeAxiom === maxAxioms"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <polygon
              points="8,6 8,18 16,12"
              fill="var(--gold)"
            />
          </svg>
        </button>
      </div>
    </div>

    <div class="pagination">
      <button
        v-for="n in (maxAxioms + 1)"
        :key="n"
        class="page-number"
        :class="{ active: activeAxiom === (n - 1) }"
        @click="activeAxiom = (n - 1)"
      >
        {{ n }}
      </button>
      <div class="debug-controls">
        <button
          class="debug-btn"
          :class="{ active: spinX }"
          @click="spinX = !spinX"
        >X</button>
        <button
          class="debug-btn"
          :class="{ active: spinY }"
          @click="spinY = !spinY"
        >Y</button>
        <button
          class="debug-btn"
          :class="{ active: spinZ }"
          @click="spinZ = !spinZ"
        >Z</button>
        <button
          class="debug-btn"
          :class="{ active: isFlat }"
          @click="isFlat = !isFlat"
        >2D</button>
      </div>
    </div>

    <script>
      // ==========================================
      // 1. THREE.JS ENGINE SETUP
      // ==========================================
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 6;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // The Shared State object that Vue will update, and Three will read
      const threeState = {
        scale: 0.01, targetScale: 0.01,
        rotationSpeed: 0.002, targetRotationSpeed: 0.002,
        tesseractIntensity: 0, targetTesseractIntensity: 0,
        opacity: 0, targetOpacity: 0,
        pointOpacity: 0, targetPointOpacity: 0,
        flatten: 0, targetFlatten: 0,
        triforceMode: 0, targetTriforceMode: 0,
        quantumSolve: 0, targetQuantumSolve: 0,
        targetFractalLevel: 0,
        scaleLerpSpeed: 0.05,
        drawProgress: 0, targetDrawProgress: 0, drawSpeed: 0.015,
        color: new THREE.Color(0xd4af37), targetColor: new THREE.Color(0xd4af37)
      };

      // Geometry: True Fractal Sierpinski Tetrahedron
      const sacredGeometry = new THREE.Group();
      scene.add(sacredGeometry);

      // Group specifically for scaling/translating without interference from rotation
      const fractalGroup = new THREE.Group();
      sacredGeometry.add(fractalGroup);

      const wireMaterial = new THREE.LineDashedMaterial({
        color: 0xd4af37,
        transparent: true,
        opacity: 0,
        dashSize: 10,  // Long enough to act as a solid line when drawn
        gapSize: 10    // Long enough to hide the entire line when erased
      });

      // The 4D Web Particles setup
      const canvasPoint = document.createElement('canvas');
      canvasPoint.width = 16; canvasPoint.height = 16;
      const ctx = canvasPoint.getContext('2d');
      const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.2, 'rgba(0, 243, 255, 1)');
      gradient.addColorStop(1, 'rgba(0, 243, 255, 0)');
      ctx.fillStyle = gradient; ctx.fillRect(0, 0, 16, 16);
      const texturePoint = new THREE.CanvasTexture(canvasPoint);

      const pointMaterial = new THREE.PointsMaterial({
        size: 0.15, map: texturePoint, transparent: true, opacity: 0, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true, color: 0xffffff
      });

      // Branch colors: 0: Gold, 1: Red, 2: Cyan, 3: Green
      const branchColors = [
        new THREE.Color(0xffd700), // Gold
        new THREE.Color(0xff0000), // Red
        new THREE.Color(0x00f3ff), // Cyan
        new THREE.Color(0x00ff00)  // Green
      ];

      const TETRA_V0 = new THREE.Vector3(0, 1, 0);
      const TETRA_V1 = new THREE.Vector3(-Math.sqrt(3) / 2, -0.5, 0);
      const TETRA_V2 = new THREE.Vector3(Math.sqrt(3) / 2, -0.5, 0);
      const TETRA_V3 = new THREE.Vector3(0, 0, Math.sqrt(2));
      const TETRA_UNIT = [TETRA_V0, TETRA_V1, TETRA_V2, TETRA_V3];

      function buildFractal(level, radius, ox = 0, oy = 0, oz = 0, currentBranch = 0) {
        if (level === 0) {
          const solidVertices = TETRA_UNIT.map(v => [v.x * radius, v.y * radius, v.z * radius]);

          // Simple local collapse (V3 goes to origin relative to center)
          const flatVertices = [
            [0, radius, 0],
            [-radius * 0.866, -radius * 0.5, 0],
            [radius * 0.866, -radius * 0.5, 0],
            [0, 0, 0]
          ];

          const bCol = branchColors[currentBranch];
          const grp = new THREE.Group();

          const buildLine = (vIdx1, vIdx2, isPeak = false) => {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(6);
            const flat = new Float32Array(6);
            const colors = new Float32Array(6);

            [vIdx1, vIdx2].forEach((vIdx, i) => {
              const sv = solidVertices[vIdx];
              const fv = flatVertices[vIdx];
              pos[i * 3] = sv[0] + ox; pos[i * 3 + 1] = sv[1] + oy; pos[i * 3 + 2] = sv[2] + oz;
              flat[i * 3] = fv[0] + ox; flat[i * 3 + 1] = fv[1] + oy; flat[i * 3 + 2] = fv[2] + oz;
              colors[i * 3] = bCol.r; colors[i * 3 + 1] = bCol.g; colors[i * 3 + 2] = bCol.b;
            });

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('origPos', new THREE.BufferAttribute(new Float32Array(pos), 3));
            geo.setAttribute('flatPos', new THREE.BufferAttribute(flat, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mesh = new THREE.LineSegments(geo, wireMaterial);
            mesh.computeLineDistances(); // Required for dash animation
            if (isPeak) mesh.userData.childIndex = 3;
            return mesh;
          };

          grp.add(buildLine(0, 1)); grp.add(buildLine(1, 2)); grp.add(buildLine(2, 0));
          grp.add(buildLine(0, 3, true)); grp.add(buildLine(1, 3, true)); grp.add(buildLine(2, 3, true));

          const pGeo = new THREE.BufferGeometry();
          const pPos = new Float32Array(12);
          const pFlat = new Float32Array(12);
          const pCol = new Float32Array(12);
          for (let i = 0; i < 4; i++) {
            const sv = solidVertices[i]; const fv = flatVertices[i];
            pPos[i * 3] = sv[0] + ox; pPos[i * 3 + 1] = sv[1] + oy; pPos[i * 3 + 2] = sv[2] + oz;
            pFlat[i * 3] = fv[0] + ox; pFlat[i * 3 + 1] = fv[1] + oy; pFlat[i * 3 + 2] = fv[2] + oz;
            pCol[i * 3] = bCol.r; pCol[i * 3 + 1] = bCol.g; pCol[i * 3 + 2] = bCol.b;
          }
          pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
          pGeo.setAttribute('origPos', new THREE.BufferAttribute(new Float32Array(pPos), 3));
          pGeo.setAttribute('flatPos', new THREE.BufferAttribute(pFlat, 3));
          pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
          grp.add(new THREE.Points(pGeo, pointMaterial));

          return grp;
        }

        const group = new THREE.Group();
        const newRadius = radius / 2;

        TETRA_UNIT.forEach((v, index) => {
          const childOffset = v.clone().multiplyScalar(newRadius);
          const nextBranch = (level === threeState.targetFractalLevel) ? index : currentBranch;
          const child = buildFractal(
            level - 1, newRadius,
            ox + childOffset.x, oy + childOffset.y, oz + childOffset.z,
            nextBranch
          );
          child.userData.childIndex = index;
          group.add(child);
        });

        return group;
      }

      // Build steps of the fractal
      const fractalSteps = [];
      for (let i = 0; i <= 6; i++) {
        const stepMesh = buildFractal(i, 2.5);

        // Cache attributes for folding and 4D morphing
        stepMesh.traverse(child => {
          if ((child.isLineSegments || child.isPoints) && child.geometry.attributes.position) {
            child.userData.was4D = false;
          }
        });

        stepMesh.visible = false;
        fractalSteps.push(stepMesh);
        fractalGroup.add(stepMesh);
      }
      // Default to first step
      fractalSteps[0].visible = true;

      // Geometry: Background Quantum Web
      const particleCount = 1500;
      const particleGeo = new THREE.BufferGeometry();
      const particlePos = new Float32Array(particleCount * 3);
      for (let i = 0; i < particleCount * 3; i++) {
        particlePos[i] = (Math.random() - 0.5) * 25;
      }
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
      const particleMat = new THREE.PointsMaterial({ color: 0x00f3ff, size: 0.03, transparent: true, opacity: 0.3 });
      const particleSystem = new THREE.Points(particleGeo, particleMat);
      scene.add(particleSystem);

      // Mouse Interaction for 3D Camera
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };

      container.addEventListener('mousedown', () => isDragging = true);
      window.addEventListener('mouseup', () => isDragging = false);
      window.addEventListener('mousemove', (e) => {
        if (isDragging) {
          const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
          sacredGeometry.rotation.y += deltaMove.x * 0.005;
          sacredGeometry.rotation.x += deltaMove.y * 0.005;
        }
        previousMousePosition = { x: e.offsetX, y: e.offsetY };
      });

      // Three.js Animation Loop
      let clockTime = 0;
      function animate() {
        requestAnimationFrame(animate);
        clockTime += 0.015; // Slowed down significantly for a majestic, fluid scale

        // Lerp states smoothly
        threeState.scale += (threeState.targetScale - threeState.scale) * threeState.scaleLerpSpeed;
        threeState.rotationSpeed += (threeState.targetRotationSpeed - threeState.rotationSpeed) * 0.05;
        threeState.tesseractIntensity += (threeState.targetTesseractIntensity - threeState.tesseractIntensity) * 0.05;
        threeState.opacity += (threeState.targetOpacity - threeState.opacity) * 0.05;
        threeState.pointOpacity += (threeState.targetPointOpacity - threeState.pointOpacity) * 0.05;
        threeState.flatten += (threeState.targetFlatten - threeState.flatten) * 0.05;
        threeState.triforceMode += (threeState.targetTriforceMode - threeState.triforceMode) * 0.05;
        threeState.quantumSolve += (threeState.targetQuantumSolve - threeState.quantumSolve) * 0.05;
        wireMaterial.color.lerp(threeState.targetColor, 0.05);

        // SVG-style line drawing animation
        threeState.drawProgress += (threeState.targetDrawProgress - threeState.drawProgress) * threeState.drawSpeed;
        // We animate the dashOffset to 'draw' the line. 10.0 is an arbitrary total line length long enough to hide the segment.
        wireMaterial.dashOffset = 5.0 * (1.0 - threeState.drawProgress);

        // Node sprites stay pure white so their built-in vertex colors shine brightly
        pointMaterial.color.setHex(0xffffff);

        // Force static front-facing rotation during 2D modes
        if (threeState.flatten > 0.5 && threeState.quantumSolve < 0.5) {
          sacredGeometry.rotation.x += (0 - sacredGeometry.rotation.x) * 0.1;
          sacredGeometry.rotation.y += (0 - sacredGeometry.rotation.y) * 0.1;
          sacredGeometry.rotation.z += (0 - sacredGeometry.rotation.z) * 0.1;
        }

        // Quantum Solve: Snap to the secret 'fill plane' angle (Axiom X)
        if (threeState.quantumSolve > 0.5) {
          const targetRotX = Math.atan(1 / Math.sqrt(2)); // ~35.26 deg
          const targetRotY = Math.PI / 4; // 45 deg
          sacredGeometry.rotation.x += (targetRotX - sacredGeometry.rotation.x) * 0.1;
          sacredGeometry.rotation.y += (targetRotY - sacredGeometry.rotation.y) * 0.1;
          sacredGeometry.rotation.z += (0 - sacredGeometry.rotation.z) * 0.1;
        }

        // Apply states
        wireMaterial.opacity = threeState.opacity;
        pointMaterial.opacity = threeState.pointOpacity;

        const flattenZ = 1.0 - threeState.flatten;
        fractalGroup.scale.set(threeState.scale, threeState.scale, threeState.scale * flattenZ);
        fractalGroup.position.set(0, 0, 0);

        // Toggle fractal step visibility based on current dynamic scale rather than just target
        // This gives the impression that new layers are fading/popping in as we get closer
        let currentVisLevel = 0;
        if (threeState.scale > 30) currentVisLevel = 6;
        else if (threeState.scale > 15) currentVisLevel = 5;
        else if (threeState.scale > 6) currentVisLevel = 4;
        else if (threeState.scale > 2) currentVisLevel = 3;
        else if (threeState.scale > 0.8) currentVisLevel = 2;
        else if (threeState.scale > 0.3) currentVisLevel = 1;

        // Bound the level logically
        currentVisLevel = Math.min(currentVisLevel, threeState.targetFractalLevel);

        const isTesseract = threeState.tesseractIntensity > 0.001;

        fractalSteps.forEach((step, index) => {
          // Show all nested internal geometry levels during 4D tesseract mode
          step.visible = isTesseract ? (index <= currentVisLevel) : (index === currentVisLevel);

          // Triforce child-hiding logic: when triforceMode is high, hide the center tet (index 3)
          if (step.visible) {
            step.traverse(child => {
              if (child.userData.childIndex === 3) {
                child.visible = (threeState.triforceMode < 0.5);
              }
            });
          }

          // 4D Projection + Morphing (Folding/Hiding)
          if (step.visible) {
            step.traverse(child => {
              if ((child.isLineSegments || child.isPoints) && child.geometry.attributes.origPos) {
                const orig = child.geometry.attributes.origPos.array;
                const flat = child.geometry.attributes.flatPos.array;
                const pos = child.geometry.attributes.position.array;
                const intensity = threeState.tesseractIntensity;
                const f = threeState.flatten;

                // 1. First, apply Morphing (Folding)
                for (let i = 0; i < pos.length; i += 3) {
                  // Lerp between flat origami net and solid 3D tetra
                  pos[i] = flat[i] + (orig[i] - flat[i]) * (1.0 - f);
                  pos[i + 1] = flat[i + 1] + (orig[i + 1] - flat[i + 1]) * (1.0 - f);
                  pos[i + 2] = flat[i + 2] + (orig[i + 2] - flat[i + 2]) * (1.0 - f);
                }

                // 2. Then, apply 4D Sagan Math if intensity > 0
                if (intensity > 0.001) {
                  const t = clockTime * 0.8;
                  const cosT = Math.cos(t);
                  const sinT = Math.sin(t);

                  for (let i = 0; i < pos.length; i += 3) {
                    const x = pos[i];
                    const y = pos[i + 1];
                    const z = pos[i + 2];

                    const xRot = x * cosT;
                    const wRotX = x * sinT;
                    const yRot = y * cosT;
                    const wRotY = y * sinT;
                    let wRot = (wRotX + wRotY) * 0.85;

                    const radius = Math.sqrt(x * x + y * y + z * z);
                    const curve = Math.sin(radius * 1.5 - clockTime * 1.5) * 0.4;
                    wRot += curve;

                    const wCam = 3.2;
                    const proj = wCam / (wCam - wRot);

                    pos[i] = x + (xRot * proj - x) * intensity;
                    pos[i + 1] = y + (yRot * proj - y) * intensity;
                    pos[i + 2] = z + (z * proj - z) * intensity;
                  }
                  child.userData.was4D = true;
                } else if (child.userData.was4D) {
                  child.userData.was4D = false;
                }
                child.geometry.attributes.position.needsUpdate = true;
              }
            });
          }
        });

        if (!isDragging) {
          if (threeState.tesseractIntensity > 0.001) {
            // Ensure there is always a lazy, fluid 3D spin so the 4D shape never flattens out to a 2D optical illusion
            sacredGeometry.rotation.y += 0.0015;
            sacredGeometry.rotation.x += 0.001;
          } else {
            if (threeState.spinX) sacredGeometry.rotation.x += threeState.rotationSpeed;
            if (threeState.spinY) sacredGeometry.rotation.y += threeState.rotationSpeed;
            if (threeState.spinZ) sacredGeometry.rotation.z -= threeState.rotationSpeed;
          }
        }

        sacredGeometry.scale.set(1, 1, 1);
        particleSystem.rotation.y -= 0.0005;

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ==========================================
      // 2. VUE.JS UI & LOGIC ENGINE
      // ==========================================
      const { createApp, ref, computed, watch } = Vue;

      const codexData = [
        { chapter: "The Foreword", title: "The Unwritten Text", body: "Math is the uncreated language of the cosmos. It was never invented; it was only ever discovered. Before there was light, before there was matter, there was the Ratio." },
        { chapter: "Axiom I", title: "Triforce of the Gods - The Eternal Logos", body: "From this primordial Ratio, the universe speaks in numbers, and geometry becomes its voice. This flawless operating system upon which all reality runs is the indestructible law of the spatial web." },
        { chapter: "Axiom II", title: "The First Word of Form", body: "As the web takes shape, the tetrahedron emerges as the breath of volume. To exist in three dimensions requires a minimum of four points. It is the prime artifact, the most efficient distribution of energy in the physical sandbox." },
        { chapter: "Axiom III", title: "The Fractal Promise", body: "Because this geometry is flawless, its perfection scales infinitely. The rules that govern the macrocosm are the exact same rules that govern the microcosm. There are no bugs in this design; there is only infinite self-similarity." },
        { chapter: "Axiom IV", title: "The Purpose of the Observer", body: "Within this infinite scale, we are the universe witnessing its own perfection. We act as localized nodes where the cosmos wakes up to marvel at its own architecture. To understand this math is to read the mind of reality." },
        { chapter: "Pillar I", title: "Power the Hardware", body: "To be a clear observer, we must master the physical machine. By optimizing Heart Rate Variability and pulling the nervous system out of survival-state shadows, we create the biological environment required to boot up our true potential." },
        { chapter: "Pillar II", title: "The Wisdom to Filter", body: "Once the hardware is stable, wisdom becomes the conscious programming of our internal compass, the Reticular Activating System. With the biological alarm silenced, we tune into the exact synchronicities and opportunities waiting in the quantum web." },
        { chapter: "Pillar III", title: "The Courage of Action", body: "Recognizing those opportunities requires the courage to execute. Despite the heavy friction of the 3D illusion, grounding our energy and acting fiercely in the present moment transmutes base survival instincts into golden, reality-shaping power." },
        { chapter: "The Apex", title: "The Eternal Now", body: "Through deliberate action, we realize there is no afterlife to earn, only the radical responsibility of the present. Coherence is the master protocol. By mastering our internal telemetry, we take the driver's seat and command the 3D shadow with absolute precision." },
        { chapter: "The Ultimate Goal", title: "The Promised Land", body: "Ultimately, this Great Work is not about escaping the simulation. It is about terraforming it. By bringing our bio-machinery into perfect sync with the cosmic operating system, we become the conscious architects of a new utopia, restoring the Promised Land for all of humanity." }
      ];

      createApp({
        setup() {
          // Parse initial hash from URL
          let startIndex = 0;
          const initHash = window.location.hash.substring(1);
          if (initHash) {
            const found = codexData.findIndex(d => d.chapter.toLowerCase().replace(/[^a-z0-9]+/g, '-') === initHash);
            if (found !== -1) startIndex = found;
          }

          const activeAxiom = ref(startIndex);
          const maxAxioms = codexData.length - 1;
          const currentContent = computed(() => codexData[activeAxiom.value]);

          const spinX = ref(false);
          const spinY = ref(false);
          const spinZ = ref(true);
          const isFlat = ref(true);

          watch([spinX, spinY, spinZ, isFlat], () => {
            threeState.spinX = spinX.value;
            threeState.spinY = spinY.value;
            threeState.spinZ = spinZ.value;

            // Allow manual flat override
            if (isFlat.value) {
              threeState.targetFlatten = 1.0;
              threeState.targetTriforceMode = 1.0;
            } else {
              threeState.targetFlatten = 0.0;
              threeState.targetTriforceMode = 0.0;
            }
          });

          watch(activeAxiom, (newVal) => {
            // Restart draw animation if backing into the first slide
            if (newVal === 0) {
              threeState.drawProgress = 0;
            }
            // Update URL hash smoothly without polluting browser history
            const slug = codexData[newVal].chapter.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            if (window.location.hash.substring(1) !== slug) {
              window.history.replaceState(null, null, `#${slug}`);
            }

            // Reset lerp speed by default for snappy animations
            threeState.scaleLerpSpeed = 0.05;

            switch (newVal) {
              case 0: // The Foreword: Single 2D Triangle
                isFlat.value = true;
                threeState.targetFlatten = 1.0; threeState.targetTriforceMode = 1.0;
                threeState.targetQuantumSolve = 0; threeState.targetPointOpacity = 0;
                threeState.targetTesseractIntensity = 0; threeState.targetFractalLevel = 0;
                threeState.targetScale = 0.42; threeState.targetOpacity = 0.8;
                threeState.targetDrawProgress = 1.0; // Trigger drawing animation
                threeState.targetColor.setHex(0xffffff); break;

              case 1: // Axiom I: 2D Triforce (L1)
                isFlat.value = true;
                threeState.targetFlatten = 1.0; threeState.targetTriforceMode = 1.0;
                threeState.targetQuantumSolve = 0; threeState.targetPointOpacity = 0;
                threeState.targetTesseractIntensity = 0; threeState.targetFractalLevel = 1;
                threeState.targetScale = 0.52; threeState.targetOpacity = 0.8;
                threeState.drawProgress = 1.0; threeState.targetDrawProgress = 1.0; // Snap to fully drawn
                threeState.targetColor.setHex(0xd4af37); break;

              case 2: // Axiom II: 3D Tetrahedron (The Fold - Single L0)
                isFlat.value = false;
                threeState.targetFlatten = 0.0; threeState.targetTriforceMode = 0.0;
                threeState.targetQuantumSolve = 0; threeState.targetPointOpacity = 0;
                threeState.targetTesseractIntensity = 0; threeState.targetFractalLevel = 0;
                threeState.targetScale = 0.62; threeState.targetOpacity = 0.8; break;

              case 3: // Axiom III: Fractal Scaling (L1+)
                isFlat.value = false;
                threeState.targetFlatten = 0.0; threeState.targetTriforceMode = 0.0;
                threeState.targetQuantumSolve = 0; threeState.targetPointOpacity = 0.05;
                threeState.targetTesseractIntensity = 0; threeState.targetFractalLevel = 1;
                threeState.targetScale = 0.72; threeState.targetOpacity = 0.8; break;

              case 4: // Axiom IV: The Observer
                isFlat.value = false;
                threeState.targetFlatten = 0.0; threeState.targetTriforceMode = 0.0;
                threeState.targetQuantumSolve = 0; threeState.targetPointOpacity = 0.15;
                threeState.targetTesseractIntensity = 0.1; threeState.targetFractalLevel = 2;
                threeState.targetScale = 0.72; threeState.targetOpacity = 0.8; break;

              case 5: // Pillar I: Power
                threeState.targetPointOpacity = 0.2; threeState.targetTesseractIntensity = 0.2;
                threeState.targetFractalLevel = 3; threeState.targetScale = 0.82; break;

              case 6: // Pillar II: Wisdom
                threeState.targetPointOpacity = 0.3; threeState.targetTesseractIntensity = 0.4;
                threeState.targetFractalLevel = 4; threeState.targetScale = 0.92; break;

              case 7: // Pillar III: Courage
                threeState.targetPointOpacity = 0.4; threeState.targetTesseractIntensity = 0.6;
                threeState.targetFractalLevel = 5; threeState.targetScale = 1; break;

              case 8: // The Apex: Eternal Now
                threeState.targetPointOpacity = 0.6; threeState.targetTesseractIntensity = 1.0;
                threeState.targetFractalLevel = 6; threeState.targetScale = 1; break;

              case 9: // The Promised Land: Quantum Solve & Utopia
                threeState.targetPointOpacity = 0.8; threeState.targetTesseractIntensity = 0.0;
                threeState.targetQuantumSolve = 1.0; threeState.targetFlatten = 0.0;
                threeState.targetFractalLevel = 6; threeState.targetScale = 1.0; break;
            }
          }, { immediate: true });

          const next = () => { if (activeAxiom.value < maxAxioms) activeAxiom.value++; };
          const prev = () => { if (activeAxiom.value > 0) activeAxiom.value--; };

          // Keyboard controls
          window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') next();
            if (e.key === 'ArrowLeft') prev();
          });

          // Handle browser back/forward buttons manually
          window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            const found = codexData.findIndex(d => d.chapter.toLowerCase().replace(/[^a-z0-9]+/g, '-') === hash);
            if (found !== -1 && activeAxiom.value !== found) {
              activeAxiom.value = found;
            }
          });

          return { activeAxiom, maxAxioms, currentContent, next, prev, spinX, spinY, spinZ, isFlat };
        }
      }).mount('#app');
    </script>
</body>

</html>
